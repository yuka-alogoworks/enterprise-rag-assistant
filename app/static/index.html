<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enterprise RAG Assistant</title>
    <style>
      body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
      textarea { width: 100%; height: 100px; }
      button { margin-top: 0.75rem; padding: 0.5rem 1rem; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 1rem; margin-top: 1rem; }
      .muted { color: #666; font-size: 0.9rem; }
      code { background: #f6f6f6; padding: 0.1rem 0.35rem; }
    </style>
  </head>
  <body>
    <h1>Enterprise RAG Assistant</h1>
    <p class="muted">FastAPI + LangGraph + Chroma + Ollama</p>

    <label for="question">質問</label>
    <textarea id="question">有給休暇の申請期限は？</textarea>
    <br />
    <button id="send">送信</button>

    <div id="result" class="card" hidden>
      <h2>回答</h2>
      <p id="answer"></p>
      <h3>根拠</h3>
      <ul id="citations"></ul>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
